# Ref: docs/spec/task.md
# 说明：
# 1) Option-C：env 下参数“全放开”，yaml 改什么就是什么。
# 2) 但为保持研究可比性，仍建议将部分参数视为“基线参数”：不建议随意改动。
#    这些注释仅用于提示，不会阻止你修改（除非你自己在实验规范中约束）。

env:
  # 时间步（建议不改：需与数据频率一致）
  dt_hours: 0.25 # 1/4小时

  # 约束模式与物理后端
  # 提示：论文实验建议用 CLI 覆盖该字段，避免频繁复制 YAML：
  #   uv run python -m cchp_physical_env train --constraint-mode reward_only ...
  constraint_mode: physics_in_loop
  physics_backend: tespy

  # 必标定（物理主线）
  ua_mw_per_k: 0.06
  sigma_per_hour: 0.002  # TES 热损耗率（每小时）。工程实际：良好保温约 0.1~0.5%/h；原值 0.02 过高（每步损耗 0.5%，全年累计极大）
  cop_nominal: 0.75
  abs_t_drive_min_k: 348.15
  abs_t_drive_ref_k: 368.15
  abs_cop_min_fraction: 0.50
  m_exh_per_fuel_ratio: 18.0
  t_exh_offset_k: 220.0
  t_exh_slope_k_per_mw: 2.0

  # GT/BES 电侧参数（部分建议不改：影响可比性）
  p_gt_cap_mw: 12.0
  gt_min_output_mw: 1.0
  gt_ramp_mw_per_step: 2.5
  gt_eta_min: 0.26
  gt_eta_max: 0.36
  gas_lhv_mj_per_kg: 50.0
  gt_om_var_cost_per_mwh: 20.0
  gt_start_cost: 250.0
  gt_startup_fuel_correction_ratio: 0.10
  gt_dynamic_om_enabled: true
  gt_cycle_cost: 250.0
  gt_cycle_hours: 1.0

  p_bes_cap_mw: 4.0
  e_bes_cap_mwh: 8.0
  bes_soc_init: 0.50
  bes_soc_min: 0.10
  bes_soc_max: 0.95
  bes_eta_charge: 0.95
  bes_eta_discharge: 0.95
  bes_self_discharge_per_hour: 0.0
  bes_aux_equip_eff: 1.0
  bes_init_strategy: half
  bes_dod_battery_capex_per_mwh: 350000.0
  bes_dod_k_p: 1.14
  bes_dod_n_fail_100: 6000.0
  bes_dod_add_calendar_age: false
  bes_dod_battery_life_years: 10.0

  # 电网与价格（部分建议不改：影响可比性）
  grid_import_cap_mw: 30.0
  grid_export_cap_mw: 10.0
  # 允许外送电，但避免“套利/卖电发电”主导策略：
  # - sell_price_ratio: 上网电价按购电价的比例折算
  # - sell_price_cap_per_mwh: 进一步对上网电价封顶（0 表示不封顶）
  # - penalty_export_*: 外送电交易摩擦与软上限惩罚（见 costs.py）
  sell_price_ratio: 0.20
  sell_price_cap_per_mwh: 300.0
  penalty_curtail_per_mwh: 20.0
  penalty_export_per_mwh: 100.0
  grid_export_soft_cap_mw: 2.0
  penalty_export_over_soft_cap_per_mwh: 2500.0

  # 碳排放因子（建议不改：用于论文口径）
  gt_emission_ton_per_mwh_th: 0.202
  boiler_emission_ton_per_mwh_th: 0.202

  # 可靠性与约束罚金（建议不改：reward 口径）
  penalty_unmet_e_per_mwh: 3000.0
  penalty_unmet_h_per_mwh: 2500.0
  penalty_unmet_c_per_mwh: 2500.0
  penalty_violation_per_flag: 50.0
  abs_gate_enabled: true
  abs_gate_scale_k: 2.0
  abs_deadzone_gate_th: 0.15
  abs_deadzone_u_th: 0.10
  abs_invalid_req_u_th: 0.10
  abs_invalid_req_gate_th: 0.20
  penalty_invalid_abs_request: 10.0
  # 工业语义下允许“有限锅炉辅助 ABS”，而不是完全混热池：
  # - 供热优先后，锅炉只允许拿一小部分余量给 ABS
  # - 这更接近 supplementary firing / auxiliary boiler assisted ABS
  abs_boiler_drive_enabled: true
  abs_boiler_assist_max_mw: 1.50
  abs_boiler_assist_boiler_fraction: 0.35
  ech_cop_partload_min_fraction: 0.72
  ech_cop_partload_curve_exp: 1.15
  gt_action_smoothing_enabled: true
  gt_min_on_steps: 8.0
  gt_min_off_steps: 8.0
  penalty_gt_toggle: 100.0
  penalty_gt_delta_mw: 5.0
  heat_unmet_th_mw: 0.05
  cool_unmet_th_mw: 0.05
  heat_backup_idle_th_mw: 0.50
  cool_backup_idle_th_mw: 0.50
  penalty_idle_heat_backup: 50.0
  penalty_idle_cool_backup: 50.0
  heat_backup_shield_enabled: true
  heat_backup_shield_margin_mw: 0.05

  # HRSG 边界（建议不改：物理口径）
  hrsg_water_mass_flow_kg_per_s: 45.0
  hrsg_water_inlet_k: 333.15

  # 次标定（容量参数）
  q_boiler_cap_mw: 10.0
  q_ech_cap_mw: 6.0
  q_abs_drive_cap_mw: 5.0
  q_abs_cool_cap_mw: 4.5
  e_tes_cap_mwh: 20.0
  e_tes_init_mwh: 10.0
  q_tes_charge_cap_mw: 8.0
  q_tes_discharge_cap_mw: 8.0

  # Oracle/MPC 公平性配置：用于修复 planner 上界口径
  # - strict：论文主线的公平 Oracle。允许 perfect forecast，但不允许在线 repair 兜底。
  # - debug：用于排查 surrogate/repair 逻辑，可重新打开 repair 开关。
  # - 启用 ABS，使 Oracle 不再退化为 “ECH-only” 冷侧规划
  # - 使用近似硬保供门槛，避免低成本建立在大量 unmet 上
  # - 放宽 MILP/GA 求解预算，使 Oracle 更接近“理论上界”
  oracle_mpc_abs_enabled: true
  oracle_mpc_mode: strict
  oracle_mpc_hard_reliability: true
  oracle_mpc_max_unmet_e_mw: 0.0
  oracle_mpc_max_unmet_h_mw: 0.01
  oracle_mpc_max_unmet_c_mw: 0.05
  oracle_mpc_hard_unmet_penalty_per_mwh: 250000.0
  oracle_mpc_heat_backup_repair_enabled: false
  oracle_mpc_cool_backup_repair_enabled: false
  oracle_mpc_tes_terminal_reserve_mwh: 4.0
  oracle_mpc_tes_terminal_reserve_penalty_per_mwh: 2000.0
  oracle_mpc_abs_ready_cooling_threshold_mw: 1.50
  oracle_mpc_abs_ready_reserve_extra_mwh: 0.00
  oracle_mpc_abs_ready_terminal_value_per_mwh: 0.0
  oracle_mpc_planning_horizon_steps: 24.0
  oracle_mpc_replan_interval_steps: 4.0
  oracle_mpc_time_limit_seconds: 4.0
  oracle_mpc_mip_relative_gap: 0.005
  oracle_ga_population_size: 24.0
  oracle_ga_generations: 8.0
  oracle_ga_elite_count: 4.0
  oracle_ga_mutation_scale: 0.10

  # pyomo 求解配置
  pyomo_solver: projection
  pyomo_tracking_weight: 1.0
  pyomo_unmet_penalty_weight: 1000.0
  pyomo_curtail_penalty_weight: 100.0

training:
  # 训练随机种子（影响 episode 随机切片起点、采样与初始化；用于复现实验）
  # 注意：对固定 2025 全年 + deterministic SB3 eval，这个 seed 通常不会改变最终 KPI；
  # 它只会改变输出目录名，除非环境本身含有随机初始化（例如 bes_init_strategy=random）。
  seed: 42
  # 策略类型：
  # - rule / easy_rule / random / milp_mpc / ga_mpc：基线策略（不训练深度模型，主要由 episodes 控制评估/统计采样量）
  # - sequence_rule：序列策略（transformer/mamba），会走深度训练（train_steps/batch_size/update_epochs/lr 生效）
  policy: sequence_rule
  # sequence_rule 的骨干网络：rule / mlp / transformer / mamba
  # - policy=rule 时该字段基本不影响
  # - policy=sequence_rule 时为 mlp/transformer/mamba 才会启用深度训练
  sequence_adapter: transformer
  # 序列策略输入窗口长度（单位：步）。15min 数据下：16 步≈4 小时上下文。
  # 常改：越大越能看长期依赖，但训练更慢/更吃显存。
  # policy=milp_mpc/ga_mpc 时，该字段也作为 MPC planning horizon 的输入（内部会做上限裁剪以控制求解开销）。
  history_steps: 32
  # 每个 episode 的时间切片长度（单位：天），强约束：[7, 30]。
  # - 这不是“训练总天数”，而是每次 rollout 的连续窗口长度。
  # - 不稳就先从 7/14 天开始。
  episode_days: 14
  # episode 数量（主要对 rule/random 训练或评估流程有意义）。
  # - policy=rule/random：episodes 越大，覆盖全年随机窗口越多，统计更稳，但运行更久。
  # - policy=sequence_rule：该字段通常不作为主要训练预算（训练预算主要由 train_steps 控制）。
  episodes: 800
  # 深度训练总环境步数预算（sequence_rule 生效）：达到该步数后停止训练。
  # 15min 数据下，train_steps=4096 约等于 42.7 天的交互步数（4096/96）。
  train_steps: 409600 # 论文级建议：409600（~4267 天步交互预算，耗时取决于硬件）
  # 深度训练 batch 大小（sequence_rule 生效）。越大训练更稳但更吃显存。
  batch_size: 256
  # 每次更新重复训练轮数（sequence_rule 生效）。越大拟合更充分但更慢，过大可能过拟合。
  update_epochs: 8
  # 学习率（sequence_rule 生效）。不稳定可先降到 1e-4 量级。
  lr: 0.0001
  # 设备：auto / cpu / cuda（sequence_rule 生效）。Kaggle 常用 auto 或 cuda。
  device: auto

  # Task-011：可选 SB3 多算法训练（PPO/SAC/TD3/DDPG/DQN）
  # 说明：
  # - CLI 优先：命令行显式传参会覆盖这里的默认值
  # - 若 sb3_enabled=true，则 `train` 命令会优先走 SB3 算法训练（而不是 baseline/sequence trainer）
  sb3_enabled: false
  # 选择算法：ppo / sac / td3 / ddpg / dqn
  sb3_algo: ddpg
  # SB3 policy backbone：mlp / transformer / mamba
  # - mlp：窗口 flatten 后走 MLP（最稳）
  # - transformer/mamba：用序列编码器提取特征，再交给 SB3 算法头（可用于 “SAC+Transformer” 对比）
  sb3_backbone: mlp
  # SB3 输入窗口长度（步），与 sequence_rule 的 history_steps 概念一致
  sb3_history_steps: 32
  # SB3 总交互步数（训练预算）
  sb3_total_timesteps: 2000000
  # 并行环境数量（DummyVecEnv），>1 可加速但更吃资源
  sb3_n_envs: 4
  # 学习率（SB3）
  sb3_learning_rate: 0.0001
  # batch size（SB3）
  sb3_batch_size: 256
  # 折扣因子（SB3）
  sb3_gamma: 0.99

  # ------------------------------
  # SB3 训练稳定性增强（强烈建议显式写出）
  # ------------------------------

  # VecNormalize：观测归一化
  # - true：训练与评估都使用同一份 obs 归一化统计（由训练过程保存并在评估时加载）
  # - false：不做 obs 归一化（一般更不稳，除非你已经手动标准化过观测）
  sb3_vec_norm_obs: true
  # VecNormalize：奖励归一化（训练时启用；评估时会自动关闭 reward norm 以保持 KPI 口径）
  sb3_vec_norm_reward: true

  # 训练过程中的评估频率（以环境步计）
  # - 对 n_envs>1 的情况：实际 callback 触发频率会按 n_envs 做折算（见 policy/sb3.py）
  sb3_eval_freq: 50000
  # 训练过程评估时，每个 eval episode 的采样天数（固定在 [7,30]）
  # - 建议与训练 episode_days 保持一致，确保 best checkpoint 选择口径一致
  sb3_eval_episode_days: 14
  # 固定多窗口验证池：预生成 N 个全年覆盖窗口，每次评估用固定 M 个窗口求均值。
  # - 设为 0 可回退到旧的固定年末 tail 窗口
  # - 单入口 seed 协议：评估窗口的随机种子直接跟随 training.seed，不再单独配置
  sb3_eval_window_pool_size: 12
  sb3_eval_window_count: 4
  sb3_ppo_warm_start_enabled: true
  sb3_residual_enabled: true
  sb3_residual_policy: rule
  sb3_residual_scale: 0.25
  sb3_ppo_warm_start_samples: 16384
  sb3_ppo_warm_start_epochs: 4
  sb3_ppo_warm_start_batch_size: 256
  sb3_ppo_warm_start_lr: 0.0001
  sb3_offpolicy_prefill_enabled: true
  sb3_offpolicy_prefill_steps: 20000
  sb3_offpolicy_prefill_policy: rule

  # ------------------------------
  # PPO 专属超参数（仅 algo=ppo 时真正生效）
  # ------------------------------

  # 每次 rollout 收集的步数（等价于 SB3 的 n_steps）
  sb3_ppo_n_steps: 2048
  # GAE lambda（优势估计平滑参数）
  sb3_ppo_gae_lambda: 0.95
  # 熵系数（鼓励探索）；若出现“策略过于随机”可降低
  sb3_ppo_ent_coef: 0.0
  # PPO clip range（策略更新的裁剪幅度）
  sb3_ppo_clip_range: 0.2

  # ------------------------------
  # DQN 专属超参数（仅 algo=dqn 时真正生效）
  # - 当前默认采用论文风格的 rule-based discrete action（rb_v1）
  # ------------------------------
  sb3_dqn_action_mode: rb_v1
  sb3_dqn_target_update_interval: 1000
  sb3_dqn_exploration_fraction: 0.3
  sb3_dqn_exploration_initial_eps: 1.0
  sb3_dqn_exploration_final_eps: 0.05

  # ------------------------------
  # Off-policy 通用超参数（SAC/TD3/DDPG/DQN）
  # ------------------------------

  # replay buffer 在开始学习前的随机探索步数（learning_starts）
  # - 环境较复杂时适当增大有利于稳定
  sb3_learning_starts: 20000
  # 训练频率（每隔多少环境步做一次训练）；与 SB3 的 train_freq 对齐
  sb3_train_freq: 4
  # 每次训练更新做多少次梯度步（gradient_steps）
  sb3_gradient_steps: 4
  # target 网络软更新系数 tau（TD3/DDPG/SAC 常用）
  sb3_tau: 0.005
  # 动作噪声标准差（主要用于 TD3/DDPG 的探索；SAC 也可作为额外噪声项）
  sb3_action_noise_std: 0.05
  # Off-policy replay buffer（SAC/TD3/DDPG/DQN）。窗口观测 + n_envs>1 时默认 1e6 非常容易 OOM。
  sb3_buffer_size: 100000
  # 开启 replay buffer 内存优化（减少 next_obs 存储）。推荐保持开启。
  sb3_optimize_memory_usage: true
  # best checkpoint 选择：先过可靠性门槛，再按 reward 选最优。
  sb3_best_gate_enabled: true
  sb3_best_gate_electric_min: 1.0
  sb3_best_gate_heat_min: 0.99
  sb3_best_gate_cool_min: 0.99
  # plateau 控制：当 best 选择排名长时间不再改善时，先降 LR 做一段低学习率 fine-tune。
  # 当前默认值故意偏保守：优先保证“统一 2M 预算、只改算法名”时不容易误伤晚峰值算法（尤其 PPO/DDPG）。
  # 如需真正提前停止，请在实验里显式收紧 early_stop_patience_evals。
  sb3_plateau_control_enabled: true
  sb3_plateau_patience_evals: 10
  sb3_plateau_lr_decay_factor: 0.5
  sb3_plateau_min_lr: 0.00005
  sb3_plateau_early_stop_patience_evals: 999

  # Task-012：PAFC-TD3 通用 train/eval 路由默认参数
  # - 只有当 policy: pafc_td3 时才会生效
  # - projection surrogate checkpoint 建议优先通过 CLI 显式传入：
  #   uv run python -m cchp_physical_env train --policy pafc_td3 --pafc-projection-surrogate-checkpoint ...
  pafc_projection_surrogate_checkpoint: ""
  pafc_episode_days: 7
  pafc_total_env_steps: 4096
  pafc_warmup_steps: 512
  pafc_replay_capacity: 50000
  pafc_batch_size: 128
  pafc_updates_per_step: 1
  pafc_gamma: 0.99
  pafc_tau: 0.005
  pafc_actor_lr: 0.0001
  pafc_critic_lr: 0.0003
  pafc_dual_lr: 0.005
  # dual 先给 reward/teacher 一段适应时间，再逐步拉起可靠性乘子，避免过早塌到保守 fallback
  pafc_dual_warmup_steps: 1024
  pafc_actor_delay: 2
  pafc_exploration_noise_std: 0.08
  pafc_target_policy_noise_std: 0.08
  pafc_target_noise_clip: 0.15
  pafc_gap_penalty_coef: 0.5
  pafc_exec_action_anchor_coef: 5.0
  # 风险低时放松 executed-action 锚定，给 actor 经济改进空间；风险高时自动恢复强锚定
  pafc_exec_action_anchor_safe_floor: 0.2
  # GT 小正请求若低于最小出力的一定比例，直接解释为“关机”；默认关闭，只在专项调参时打开
  pafc_gt_off_deadband_ratio: 0.0
  pafc_abs_ready_focus_coef: 0.0
  pafc_invalid_abs_penalty_coef: 0.0
  pafc_economic_boiler_proxy_coef: 0.0
  pafc_economic_abs_tradeoff_coef: 0.0
  # 价格高且系统有余量时，抑制“全买电”保守动作，鼓励 GT/联供侧承担更多经济调节
  pafc_economic_gt_grid_proxy_coef: 0.25
  # 经济教师蒸馏默认关闭；启用时使用 economic checkpoint 在安全窗口内教 actor 学习更省钱的调度
  pafc_economic_teacher_distill_coef: 0.0
  # 经济教师只有在单步代理经济性至少优于 safe teacher 一定比例时，才写入 replay
  pafc_economic_teacher_proxy_advantage_min: 0.02
  # 对 GT 维单独放宽经济优势门槛；GT 替网的收益往往体现在整段负荷窗口，而不是单步超大代理差
  pafc_economic_teacher_gt_proxy_advantage_min: 0.01
  # 对 BES 单维调度单独放宽门槛，否则电池单步节省过小，教师几乎不会教会细粒度套利
  pafc_economic_teacher_bes_proxy_advantage_min: 0.002
  # 经济教师允许相对 safe teacher 增加的 ABS 无效请求风险上限
  pafc_economic_teacher_max_safe_abs_risk_gap: 0.05
  # 经济教师 raw->exec 投影 gap 过大时，视为不可迁移目标，直接拒绝
  pafc_economic_teacher_projection_gap_max: 0.20
  # 对 GT 维额外放宽 raw->exec gap 门槛，因为 GT 常因最小出力/爬坡被 solver 重解释，但 executed action 依然有较强经济意义
  pafc_economic_teacher_gt_projection_gap_max: 1.0
  # 当电价/SOC 已给出明确套利信号时，要求 BES 教师动作与该符号一致
  pafc_economic_teacher_bes_price_opportunity_min: 0.10
  # 对带有经济教师 BES 目标的 replay 样本，在线 actor update 维持更强 executed-action 锚定，避免 warm-start 后被 critic 拉回保守调度
  pafc_economic_teacher_bes_anchor_preserve_scale: 0.85
  # 教师样本进入 actor warm-start 后，按动作维重要性做额外加权，避免 u_bes 单维目标被 base target 淹没
  pafc_economic_teacher_warm_start_weight: 4.0
  # 对已接受的经济教师 transition 额外复制进 replay，提升训练初期教师样本占比
  pafc_economic_teacher_prefill_replay_boost: 2
  # 经济教师动作维加权：突出 GT 替网信号，其次是 BES 峰谷套利，再是 TES 协同
  pafc_economic_teacher_gt_action_weight: 2.0
  pafc_economic_teacher_bes_action_weight: 1.5
  pafc_economic_teacher_tes_action_weight: 0.5
  # 全年经济教师 warm-start：按全年状态覆盖采样 teacher target，把 GT/BES/TES 的经济执行动作提前写进 actor
  pafc_economic_teacher_full_year_warm_start_samples: 4096
  pafc_economic_teacher_full_year_warm_start_epochs: 4
  # 持续 BES 经济蒸馏：仅约束 u_bes，利用同信息集电价与 SOC 保持峰谷套利行为不在 RL 过程中塌缩
  pafc_economic_bes_distill_coef: 0.0
  # BES 经济调度先验：仅基于同信息集电价与 SOC，帮助 PAFC-TD3 学出基本的峰谷套利
  pafc_economic_bes_prior_u: 0.35
  # 充电侧使用更强的 raw-u 幅值和权重，缓解“全年更愿意放电、不愿意低价充电”的保守偏置
  pafc_economic_bes_charge_u_scale: 1.8
  pafc_economic_bes_discharge_u_scale: 1.0
  pafc_economic_bes_charge_weight: 2.0
  pafc_economic_bes_discharge_weight: 1.0
  pafc_economic_bes_charge_pressure_bonus: 1.0
  pafc_economic_bes_charge_soc_ceiling: 0.75
  pafc_economic_bes_discharge_soc_floor: 0.35
  # 全年 BES 专项 warm-start：用全年状态覆盖把高价放电/低价充电的符号切换直接写进 actor
  pafc_economic_bes_full_year_warm_start_samples: 4096
  pafc_economic_bes_full_year_warm_start_epochs: 2
  pafc_economic_bes_full_year_warm_start_u_weight: 4.0
  # 对已采用 economic teacher 的 BES 样本提高全年 warm-start 选样优先级，减少 safe 源重新拉回保守调度
  pafc_economic_bes_teacher_selection_priority_boost: 0.75
  # 对 economic 源提供较小的常数优先级，确保样本池在不牺牲覆盖度的前提下更偏向经济调度
  pafc_economic_bes_economic_source_priority_bonus: 0.10
  # 对每种 BES 模式（charge/discharge/idle）尽量维持 economic 源的最小占比，让 warm-start 真正学到经济教师的调度风格
  pafc_economic_bes_economic_source_min_share: 0.75
  # idle 模式可单独设更保守的 economic 源占比，避免为追求经济性过度牺牲冷负荷边界
  pafc_economic_bes_idle_economic_source_min_share: 0.75
  # 若需要进一步突出真实 economic teacher 动作，可为“已采用 teacher target 的样本”设置最小占比
  pafc_economic_bes_teacher_target_min_share: 0.0
  pafc_state_feasible_action_shaping_enabled: false
  pafc_abs_min_on_gate_th: 0.75
  pafc_abs_min_on_u_margin: 0.02
  pafc_expert_prefill_policy: easy_rule_abs
  # 若使用 checkpoint 作为 prefill/teacher，请在这里或 CLI 传入：
  # --pafc-expert-prefill-policy checkpoint --pafc-expert-prefill-checkpoint-path <actor.pt/json>
  pafc_expert_prefill_checkpoint_path: ""
  # 经济教师来源：
  # - checkpoint: 复用已有 SB3/PAFC checkpoint
  # - milp_mpc / ga_mpc: 直接使用 planner rollout 后的 executed action 作为 teacher target
  pafc_expert_prefill_economic_policy: checkpoint
  # dual-teacher 模式：主 checkpoint 作为 safe teacher，economic checkpoint 作为经济教师
  # --pafc-expert-prefill-policy checkpoint_dual
  # --pafc-expert-prefill-checkpoint-path <safe pafc actor>
  # --pafc-expert-prefill-economic-policy checkpoint
  # --pafc-expert-prefill-economic-checkpoint-path <economic sb3/pafc json>
  pafc_expert_prefill_economic_checkpoint_path: ""
  pafc_expert_prefill_steps: 1024
  pafc_expert_prefill_cooling_bias: 0.5
  pafc_expert_prefill_abs_replay_boost: 0
  pafc_expert_prefill_abs_exec_threshold: 0.05
  pafc_expert_prefill_abs_window_mining_candidates: 4
  pafc_dual_abs_margin_k: 1.25
  pafc_dual_qc_ratio_th: 0.55
  pafc_dual_heat_backup_ratio_th: 0.10
  pafc_dual_safe_abs_u_th: 0.60
  pafc_actor_warm_start_epochs: 2
  pafc_actor_warm_start_batch_size: 256
  pafc_actor_warm_start_lr: 0.0001
  # 训练期 retained checkpoint / validation 间隔；0 表示自动使用总步数的四等分（带上下限）
  pafc_checkpoint_interval_steps: 0
  # PAFC best checkpoint 选择：
  # - 训练期固定 2024 验证窗口，先看可靠性门槛，再看平均总成本，最后看 reward
  # - 默认保持与 SB3 一致的 12->4 多窗口协议；若设为 0/0，则退化为固定尾窗
  pafc_eval_window_pool_size: 12
  pafc_eval_window_count: 4
  pafc_best_gate_enabled: true
  pafc_best_gate_electric_min: 1.0
  pafc_best_gate_heat_min: 0.99
  pafc_best_gate_cool_min: 0.99
  # plateau 控制默认关闭；启用后会在验证长期不改进时先降学习率，再按 patience 提前停止
  pafc_plateau_control_enabled: false
  pafc_plateau_patience_evals: 2
  pafc_plateau_lr_decay_factor: 0.5
  pafc_plateau_min_actor_lr: 0.00005
  pafc_plateau_min_critic_lr: 0.0001
  pafc_plateau_early_stop_patience_evals: 2
  pafc_hidden_dims: [256, 256]
